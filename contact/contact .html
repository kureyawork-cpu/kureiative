<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | kureyahidemitsu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="contact-header">
    <h1 class="contact-title">CONTACT</h1>
    <p class="contact-lead">ご依頼やお問合やの方は、以下のフォームよりお気軽に<br>お問い合わせください。</p>
  </header>

  <!-- フォームカード -->
  <form class="form-card" action="https://formspree.io/f/xlgolgzr" method="POST">
    <div class="form-grid">

      <!-- 会社名 -->
      <div class="form-group">
        <label class="form-label">会社名 <span class="required">必須</span></label>
        <input type="text" name="会社名" class="form-input" placeholder="中田商事株式会社" required>
      </div>

      <!-- 部署名 -->
      <div class="form-group">
        <label class="form-label">部署名 <span class="required">必須</span></label>
        <input type="text" name="部署名" class="form-input" placeholder="企画部" required>
      </div>

      <!-- 担当者名 -->
      <div class="form-group">
        <label class="form-label">担当者名 <span class="required">必須</span></label>
        <input type="text" name="担当者名" class="form-input" placeholder="中田 大郎" required>
      </div>

      <!-- 担当者名（カナ） -->
      <div class="form-group">
        <label class="form-label">担当者名（カナ）<span class="required">必須</span></label>
        <input type="text" name="担当者名カナ" class="form-input" placeholder="ナカダタロウ" required>
      </div>

      <!-- メールアドレス -->
      <div class="form-group">
        <label class="form-label">メールアドレス <span class="required">必須</span></label>
        <input type="email" name="email" class="form-input" placeholder="taro@nakada.com" required>
      </div>

      <!-- 携帯番号 -->
      <div class="form-group">
        <label class="form-label">携帯番号 <span class="required">必須</span></label>
        <input type="tel" name="携帯番号" class="form-input" placeholder="090-1234-5678" required>
      </div>

    </div>

    <!-- お問い合わせ内容 -->
    <div class="form-group form-group-full">
      <label class="form-label">お問い合わせ <span class="required">必須</span></label>
      <textarea name="お問い合わせ内容" class="form-textarea" placeholder="お問い合わせ内容を入力してください" rows="6" required></textarea>
    </div>

    <!-- プライバシーポリシー -->
    <div class="privacy-box">
      <p>「個人情報の取り扱いに関する個人情報保護基本ポリシー」に同意の上送信してください。</p>
      <p>内容に基づいた送信をする方はチェックを入れてください。</p>
    </div>

    <!-- 同意チェック -->
    <label class="agree-check">
      <input type="checkbox" class="agree-checkbox" required>
      <span class="agree-text">同意する</span>
    </label>

    <!-- 送信ボタン -->
    <div class="submit-wrap">
      <button type="submit" class="btn-submit">送信</button>
    </div>

  </form>

  <!-- フッター -->
  <footer class="contact-footer">
    <p class="footer-copy">&copy; kureyahidemitsu</p>
  </footer>

</body>
</html>
